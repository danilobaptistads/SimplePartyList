name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - run: dotnet restore

      - run: dotnet test tests/tests.csproj -c Release

      - run: dotnet publish src/web/web.csproj -c Release -o ./publish --no-restore

      - name: Install Web Deploy
        run: |
          $paths = @(
            "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe",
            "C:\Program Files (x86)\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          )
          $exists = $false
          foreach ($p in $paths) {
            if (Test-Path $p) { $exists = $true; break }
          }
          if (-not $exists) {
            choco install webdeploy -y --no-progress
          }
        shell: pwsh

      - name: Deploy via WebDeploy
        run: |
          $msdeploy = if (Test-Path "C:\Program Files (x86)\IIS\Microsoft Web Deploy V3\msdeploy.exe") {
            "C:\Program Files (x86)\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          } else {
            "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          }
          & $msdeploy `
            -verb:sync `
            -source:contentPath="${{ github.workspace }}\publish" `
            -dest:contentPath="site72502",ComputerName="https://site72502.siteasp.net:8172/msdeploy.axd",UserName="site72502",Password="${{ secrets.WEB_DEPLOY_PASS }}",AuthType="Basic" `
            -allowUntrusted
        shell: pwsh
